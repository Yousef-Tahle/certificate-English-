{% extends 'base.html' %} {% block title %}الامتحانات المتاحة{% endblock %} {%
block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-clipboard2-check-fill me-2"></i>
      الامتحانات المتاحة
    </h4>
    <span class="page-sub">اختر الامتحان الذي تريد التسجيل فيه</span>
  </div>
  <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

{% if exams %}
<form method="POST">
  <div class="row g-3 mb-4">
    {% for e in exams %}
    <div class="col-md-6">
      <div class="course-select-card">
        <input
          type="radio"
          name="exam_id"
          id="exam_{{ e.ExamID }}"
          value="{{ e.ExamID }}"
          required
        />
        <label for="exam_{{ e.ExamID }}">
          <div class="d-flex align-items-center gap-3">
            <div class="exam-icon">
              <i class="bi bi-clipboard2-check-fill"></i>
            </div>
            <div>
              <div class="fw-700">{{ e.ExamName }}</div>
              <div class="text-muted small mt-1">
                <i class="bi bi-calendar me-1"></i>{{ e.ExamDate }}
                <span class="mx-2">|</span>
                <i class="bi bi-geo-alt me-1"></i>{{ e.Location or '—' }}
              </div>
              <div class="text-muted small">
                <i class="bi bi-cash me-1"></i>{{ e.Fee or '—' }} ل.س
              </div>
            </div>
          </div>
        </label>
      </div>
    </div>
    {% endfor %}
  </div>
  <button type="submit" class="btn btn-primary">
    <i class="bi bi-check-circle-fill"></i>
    تسجيل في الامتحان
  </button>
</form>
{% else %}
<div class="card">
  <div class="card-body text-center py-5 text-muted">
    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
    لا توجد امتحانات متاحة حالياً
  </div>
</div>
{% endif %} {% endblock %}
