{% extends 'base.html' %} {% block title %}تسجيل في دورة أو امتحان{% endblock %}
{% block content %}

<!-- عنوان الصفحة -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-pencil-square me-2"></i>
      تسجيل في دورة أو امتحان
    </h4>
    <span class="page-sub">اختر الدورة أو الامتحان اللي تريد تسجل فيه</span>
  </div>
  <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-pencil-square"></i>
        بيانات التسجيل
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <!-- اختيار الدورة -->
            <div class="col-12">
              <label class="form-label">
                <i class="bi bi-book-fill me-1 text-warning"></i>
                الدورة التحضيرية (اختياري)
              </label>
              <select name="course_id" class="form-select">
                <option value="">-- لا أريد التسجيل في دورة --</option>
                {% for c in courses %}
                <option value="{{ c.CourseID }}">{{ c.CourseName }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- اختيار الامتحان -->
            <div class="col-12">
              <label class="form-label">
                <i class="bi bi-clipboard2-check-fill me-1 text-primary"></i>
                الامتحان (اختياري)
              </label>
              <select name="exam_id" class="form-select">
                <option value="">-- لا أريد التسجيل في امتحان --</option>
                {% for e in exams %}
                <option value="{{ e.ExamID }}">{{ e.ExamName }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              تسجيل
            </button>
            <a
              href="{{ url_for('student_dashboard') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
