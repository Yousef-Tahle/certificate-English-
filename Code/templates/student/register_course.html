{% extends 'base.html' %} {% block title %}الدورات المتاحة{% endblock %} {%
block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-book-fill me-2"></i>
      الدورات المتاحة
    </h4>
    <span class="page-sub">اختر الدورة التي تريد التسجيل فيها</span>
  </div>
  <a href="{{ url_for('student_dashboard') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

{% if courses %}
<form method="POST">
  <div class="row g-3 mb-4">
    {% for c in courses %}
    <div class="col-md-6">
      <div class="course-select-card">
        <input
          type="radio"
          name="course_id"
          id="course_{{ c.CourseID }}"
          value="{{ c.CourseID }}"
          required
        />
        <label for="course_{{ c.CourseID }}">
          <div class="d-flex align-items-center gap-3">
            <div class="course-icon">
              <i class="bi bi-book-fill"></i>
            </div>
            <div>
              <div class="fw-700">{{ c.CourseName }}</div>
              <div class="text-muted small mt-1">
                <i class="bi bi-clock me-1"></i>{{ c.Duration or '—' }} يوم
                <span class="mx-2">|</span>
                <i class="bi bi-cash me-1"></i>{{ c.Price or '—' }} ل.س
              </div>
            </div>
          </div>
        </label>
      </div>
    </div>
    {% endfor %}
  </div>
  <button type="submit" class="btn btn-primary">
    <i class="bi bi-check-circle-fill"></i>
    تسجيل في الدورة
  </button>
</form>
{% else %}
<div class="card">
  <div class="card-body text-center py-5 text-muted">
    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
    لا توجد دورات متاحة حالياً
  </div>
</div>
{% endif %} {% endblock %}
