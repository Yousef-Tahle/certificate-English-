{% extends 'base.html' %} {% block title %}تعديل الدورة{% endblock %} {% block
content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-pencil-square me-2"></i>
      تعديل بيانات الدورة
    </h4>
    <span class="page-sub">تعديل بيانات {{ course.CourseName }}</span>
  </div>
  <a href="{{ url_for('admin_courses') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-book-fill"></i>
        تعديل البيانات
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">اسم الدورة</label>
              <input
                type="text"
                name="name"
                class="form-control"
                value="{{ course.CourseName }}"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label">الوصف</label>
              <textarea name="description" class="form-control" rows="3">
{{ course.Description or '' }}</textarea
              >
            </div>
            <div class="col-md-6">
              <label class="form-label">المدة (بالأيام)</label>
              <input
                type="number"
                name="duration"
                class="form-control"
                value="{{ course.Duration or '' }}"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">السعر (ل.س)</label>
              <input
                type="number"
                name="price"
                class="form-control"
                value="{{ course.Price or '' }}"
                step="0.01"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">تاريخ البدء</label>
              <input
                type="date"
                name="start_date"
                class="form-control"
                value="{{ course.StartDate or '' }}"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">تاريخ الانتهاء</label>
              <input
                type="date"
                name="end_date"
                class="form-control"
                value="{{ course.EndDate or '' }}"
              />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              حفظ التعديلات
            </button>
            <a
              href="{{ url_for('admin_courses') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
