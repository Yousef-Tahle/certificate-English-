{% extends 'base.html' %} {% block title %}إضافة امتحان جديد{% endblock %} {%
block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-plus-circle-fill me-2"></i>
      إضافة امتحان جديد
    </h4>
    <span class="page-sub">أدخل بيانات الامتحان الجديد</span>
  </div>
  <a href="{{ url_for('admin_exams') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-clipboard2-check-fill"></i>
        بيانات الامتحان
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">اسم الامتحان</label>
              <input
                type="text"
                name="name"
                class="form-control"
                placeholder="مثال: IELTS - April 2026"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">موعد الامتحان</label>
              <input
                type="datetime-local"
                name="exam_date"
                class="form-control"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">المكان</label>
              <input
                type="text"
                name="location"
                class="form-control"
                placeholder="مثال: قاعة A - المبنى الرئيسي"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">الحد الأقصى للطلاب</label>
              <input
                type="number"
                name="max_students"
                class="form-control"
                placeholder="مثال: 50"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">رسوم التسجيل (ل.س)</label>
              <input
                type="number"
                name="fee"
                class="form-control"
                placeholder="مثال: 100000"
                step="0.01"
              />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              حفظ الامتحان
            </button>
            <a
              href="{{ url_for('admin_exams') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
