{% extends 'base.html' %}

{% block title %}تعديل النتيجة{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="page-header mb-0">
        <h4 class="page-title">
            <i class="bi bi-pencil-square me-2"></i>
            تعديل النتيجة
        </h4>
        <span class="page-sub">تعديل نتيجة {{ result.FullName }}</span>
    </div>
    <a href="{{ url_for('admin_results') }}" class="btn btn-outline-primary">
        <i class="bi bi-arrow-right"></i>
        رجوع
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-bar-chart-fill"></i>
                تعديل البيانات
            </div>
            <div class="card-body p-4">

                <!-- معلومات ثابتة -->
                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">الطالب</label>
                        <input type="text" class="form-control"
                               value="{{ result.FullName }}" disabled>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">الامتحان</label>
                        <input type="text" class="form-control"
                               value="{{ result.ExamName }}" disabled>
                    </div>
                </div>

                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">العلامة</label>
                            <input type="number" name="score" class="form-control"
                                   value="{{ result.Score }}"
                                   step="0.01" min="0" max="100" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">الدرجة</label>
                            <select name="grade" class="form-select">
                                <option value="">-- اختر الدرجة --</option>
                                <option value="A" {{ 'selected' if result.Grade == 'A' }}>A - ممتاز</option>
                                <option value="B" {{ 'selected' if result.Grade == 'B' }}>B - جيد جداً</option>
                                <option value="C" {{ 'selected' if result.Grade == 'C' }}>C - جيد</option>
                                <option value="D" {{ 'selected' if result.Grade == 'D' }}>D - مقبول</option>
                                <option value="F" {{ 'selected' if result.Grade == 'F' }}>F - راسب</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">تاريخ النتيجة</label>
                            <input type="date" name="result_date" class="form-control"
                                   value="{{ result.ResultDate or '' }}">
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox"
                                       name="is_passed" id="isPassed"
                                       {{ 'checked' if result.IsPassed }}>
                                <label class="form-check-label fw-bold" for="isPassed">
                                    الطالب ناجح
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle-fill"></i>
                            حفظ التعديلات
                        </button>
                        <a href="{{ url_for('admin_results') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-circle"></i>
                            إلغاء
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
