{% extends 'base.html' %} {% block title %}إضافة دورة جديدة{% endblock %} {%
block content %}

<!-- عنوان الصفحة -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-plus-circle-fill me-2"></i>
      إضافة دورة جديدة
    </h4>
    <span class="page-sub">أدخل بيانات الدورة الجديدة</span>
  </div>
  <a href="{{ url_for('admin_courses') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<!-- فورم الإضافة -->
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-book-fill"></i>
        بيانات الدورة
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">اسم الدورة</label>
              <input
                type="text"
                name="name"
                class="form-control"
                placeholder="مثال: IELTS Preparation Course"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label">الوصف</label>
              <textarea
                name="description"
                class="form-control"
                rows="3"
                placeholder="وصف مختصر للدورة"
              ></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label">المدة (بالأيام)</label>
              <input
                type="number"
                name="duration"
                class="form-control"
                placeholder="مثال: 30"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">السعر (ل.س)</label>
              <input
                type="number"
                name="price"
                class="form-control"
                placeholder="مثال: 50000"
                step="0.01"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">تاريخ البدء</label>
              <input type="date" name="start_date" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">تاريخ الانتهاء</label>
              <input type="date" name="end_date" class="form-control" />
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              حفظ الدورة
            </button>
            <a
              href="{{ url_for('admin_courses') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
