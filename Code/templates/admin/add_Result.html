{% extends 'base.html' %} {% block title %}إضافة نتيجة{% endblock %} {% block
content %}

<!-- عنوان الصفحة -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-plus-circle-fill me-2"></i>
      إضافة نتيجة جديدة
    </h4>
    <span class="page-sub">أدخل نتيجة الطالب</span>
  </div>
  <a href="{{ url_for('admin_results') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<!-- فورم الإضافة -->
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-bar-chart-fill"></i>
        بيانات النتيجة
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <!-- اختيار الطالب -->
            <div class="col-md-6">
              <label class="form-label">الطالب</label>
              <select name="student_id" class="form-select" required>
                <option value="">-- اختر الطالب --</option>
                {% for s in students %}
                <option value="{{ s.StudentID }}">{{ s.FullName }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- اختيار الامتحان -->
            <div class="col-md-6">
              <label class="form-label">الامتحان</label>
              <select name="exam_id" class="form-select" required>
                <option value="">-- اختر الامتحان --</option>
                {% for e in exams %}
                <option value="{{ e.ExamID }}">{{ e.ExamName }}</option>
                {% endfor %}
              </select>
            </div>

            <!-- العلامة -->
            <div class="col-md-6">
              <label class="form-label">العلامة</label>
              <input
                type="number"
                name="score"
                class="form-control"
                placeholder="مثال: 85.5"
                step="0.01"
                min="0"
                max="100"
                required
              />
            </div>

            <!-- الدرجة -->
            <div class="col-md-6">
              <label class="form-label">الدرجة</label>
              <select name="grade" class="form-select">
                <option value="">-- اختر الدرجة --</option>
                <option value="A">A - ممتاز</option>
                <option value="B">B - جيد جداً</option>
                <option value="C">C - جيد</option>
                <option value="D">D - مقبول</option>
                <option value="F">F - راسب</option>
              </select>
            </div>

            <!-- تاريخ النتيجة -->
            <div class="col-md-6">
              <label class="form-label">تاريخ النتيجة</label>
              <input type="date" name="result_date" class="form-control" />
            </div>

            <!-- هل نجح -->
            <div class="col-md-6 d-flex align-items-end">
              <div class="form-check form-switch">
                <input
                  class="form-check-input"
                  type="checkbox"
                  name="is_passed"
                  id="isPassed"
                />
                <label class="form-check-label fw-bold" for="isPassed">
                  الطالب ناجح
                </label>
              </div>
            </div>
          </div>

          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              حفظ النتيجة
            </button>
            <a
              href="{{ url_for('admin_results') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
