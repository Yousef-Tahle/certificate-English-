{% extends 'base.html' %} {% block title %}تعديل الامتحان{% endblock %} {% block
content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <div class="page-header mb-0">
    <h4 class="page-title">
      <i class="bi bi-pencil-square me-2"></i>
      تعديل بيانات الامتحان
    </h4>
    <span class="page-sub">تعديل بيانات {{ exam.ExamName }}</span>
  </div>
  <a href="{{ url_for('admin_exams') }}" class="btn btn-outline-primary">
    <i class="bi bi-arrow-right"></i>
    رجوع
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card">
      <div class="card-header">
        <i class="bi bi-clipboard2-check-fill"></i>
        تعديل البيانات
      </div>
      <div class="card-body p-4">
        <form method="POST">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">اسم الامتحان</label>
              <input
                type="text"
                name="name"
                class="form-control"
                value="{{ exam.ExamName }}"
                required
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">موعد الامتحان</label>
              <input
                type="datetime-local"
                name="exam_date"
                class="form-control"
                value="{{ exam.ExamDate | string | replace(' ', 'T') }}"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">المكان</label>
              <input
                type="text"
                name="location"
                class="form-control"
                value="{{ exam.Location or '' }}"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">الحد الأقصى للطلاب</label>
              <input
                type="number"
                name="max_students"
                class="form-control"
                value="{{ exam.MaxStudents or '' }}"
              />
            </div>
            <div class="col-md-6">
              <label class="form-label">رسوم التسجيل (ل.س)</label>
              <input
                type="number"
                name="fee"
                class="form-control"
                value="{{ exam.Fee or '' }}"
                step="0.01"
              />
            </div>
          </div>
          <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-circle-fill"></i>
              حفظ التعديلات
            </button>
            <a
              href="{{ url_for('admin_exams') }}"
              class="btn btn-outline-secondary"
            >
              <i class="bi bi-x-circle"></i>
              إلغاء
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
